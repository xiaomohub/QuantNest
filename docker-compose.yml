version: '3.8'

services:

  # ─────────────────────────────────────────
  # MySQL 数据库
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: quantnest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: quantnest123
      MYSQL_DATABASE: quantnest
      MYSQL_USER: quantnest
      MYSQL_PASSWORD: quantnest123
    ports:
      - "3306:3306"        # 本地调试时可直连，生产环境可去掉
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d   # 放初始化 SQL 脚本
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pquantnest123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis 缓存
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantnest-redis
    restart: unless-stopped
    command: redis-server --requirepass quantnest123
    ports:
      - "6379:6379"        # 本地调试时可直连，生产环境可去掉
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "quantnest123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Spring Boot 后端
  # ─────────────────────────────────────────
  backend:
    build:
      context: .                      # 项目根目录（含 pom.xml）
      dockerfile: docker/backend/Dockerfile
    container_name: quantnest-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantnest?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: quantnest
      SPRING_DATASOURCE_PASSWORD: quantnest123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: quantnest123
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}   # 从 .env 文件读取，不要硬编码
    ports:
      - "8080:8080"        # 本地调试时直接访问后端，正常走 Nginx 代理
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s    # Spring Boot 启动比较慢，给足时间

  # ─────────────────────────────────────────
  # React 前端（Nginx 托管 + 反向代理）
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend              # 前端项目目录
      dockerfile: Dockerfile
    container_name: quantnest-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"          # 如果配了 SSL 证书
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 如需 SSL：
      # - ./docker/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  mysql_data:
  redis_data: